<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Phaser 3 - 1000 Containers Test</title>
    <style>
      html,
      body,
      #app {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #111827;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
    <script>
      class TestScene extends Phaser.Scene {
        create() {
          this.info = this.add
            .text(12, 12, '', {
              fontFamily: 'monospace',
              fontSize: '14px',
              color: '#e5e7eb',
              backgroundColor: '#00000099',
              padding: { x: 8, y: 6 },
            })
            .setDepth(9999)

          const cols = 100
          const rows = 100
          const count = cols * rows

          const w = this.scale.width
          const h = this.scale.height
          const margin = 30
          const top = 70

          const cellW = (w - margin * 2) / cols
          const cellH = (h - top - margin) / rows

          this.containers = []

          for (let i = 0; i < count; i++) {
            const c = i % cols
            const r = Math.floor(i / cols)

            const x = margin + c * cellW + cellW * 0.5
            const y = top + r * cellH + cellH * 0.5

            const box = this.add.rectangle(0, 0, cellW * 0.7, cellH * 0.7, 0x3a86ff, 0.85)
            const dot = this.add.circle(
              cellW * 0.18,
              -cellH * 0.18,
              Math.max(2, Math.min(cellW, cellH) * 0.12),
              0xffbe0b,
              0.9
            )

            const container = this.add.container(x, y, [box, dot])
            this.containers.push(container)
          }
        }

        update(time) {
          this.info.setText([
            'Phaser 3 - 10000 Containers',
            `containers: ${this.containers.length}`,
            `objects: ${this.containers.length * 2}`,
            `fps: ${Math.round(this.game.loop.actualFps)}`,
            `size: ${this.scale.width} x ${this.scale.height}`,
            `dpr: ${window.devicePixelRatio}`,
          ])
        }
      }

      new Phaser.Game({
        type: Phaser.WEBGL,
        parent: 'app',
        width: '100%',
        height: '100%',
        backgroundColor: '#111827',
        scene: TestScene,
        scale: {
          mode: Phaser.Scale.RESIZE,
          autoCenter: Phaser.Scale.CENTER_BOTH,
        },
      })
    </script>
  </body>
</html>
