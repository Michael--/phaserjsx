<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Phaser 3/4 Mask Repro</title>
    <style>
      html,
      body,
      #app {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #111827;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <script>
      const params = new URLSearchParams(location.search)
      const PHASER_MAJOR = params.get('phaser') === '4' ? 4 : 3
      const PHASER_URL =
        PHASER_MAJOR === 4
          ? 'https://cdn.jsdelivr.net/npm/phaser@4.1.0/dist/phaser.min.js'
          : 'https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js'

      const script = document.createElement('script')
      script.src = PHASER_URL
      script.onload = boot
      document.head.appendChild(script)

      function setVersion(v) {
        location.search = '?phaser=' + v
      }

      // ── Stencil-Mask helpers (Phaser 4 only) ────────────────────────────────
      // A minimal WebGL program to rasterize a rotated rectangle directly into
      // the stencil buffer – no framebuffer, no Phaser filter overhead.
      let _sp = null

      function getStencilProg(gl) {
        if (_sp) return _sp
        const compile = (type, src) => {
          const s = gl.createShader(type)
          gl.shaderSource(s, src)
          gl.compileShader(s)
          return s
        }
        const prog = gl.createProgram()
        gl.attachShader(
          prog,
          compile(gl.VERTEX_SHADER, 'attribute vec2 a;void main(){gl_Position=vec4(a,0.,1.);}')
        )
        gl.attachShader(
          prog,
          compile(gl.FRAGMENT_SHADER, 'precision mediump float;void main(){gl_FragColor=vec4(1.);}')
        )
        gl.linkProgram(prog)
        _sp = { prog, aLoc: gl.getAttribLocation(prog, 'a'), buf: gl.createBuffer() }
        return _sp
      }

      // Draws a rotated rectangle into the currently active stencil buffer.
      // cx/cy/w/h are in logical game pixels; rot is in radians.
      // logW/logH must be renderer.width / renderer.height (logical dimensions).
      function drawRectToStencil(gl, cx, cy, w, h, rot, logW, logH) {
        const cos = Math.cos(rot),
          sin = Math.sin(rot)
        const hw = w / 2,
          hh = h / 2
        // 4 corners in TRIANGLE_STRIP order: TL, TR, BL, BR
        const corners = [
          [-hw, -hh],
          [hw, -hh],
          [-hw, hh],
          [hw, hh],
        ]
        const v = new Float32Array(8)
        corners.forEach(([lx, ly], i) => {
          const wx = cx + lx * cos - ly * sin
          const wy = cy + lx * sin + ly * cos
          // NDC from logical coords: renderer.width/height == world coords, no dpr needed
          v[i * 2] = (wx / logW) * 2 - 1
          v[i * 2 + 1] = 1 - (wy / logH) * 2
        })
        const { prog, aLoc, buf } = getStencilProg(gl)
        // Save all state we're about to touch.
        // IMPORTANT: renderer.gl is the raw WebGL context. Phaser 4 uses a
        // separate WebGLGlobalWrapper for state-tracking. Any raw GL call we
        // make bypasses that tracker → if we don't restore the exact raw state
        // the tracker expects, Phaser silently skips rebinds and crashes.
        const prevProg = gl.getParameter(gl.CURRENT_PROGRAM)
        const prevBuf = gl.getParameter(gl.ARRAY_BUFFER_BINDING)
        // Cannot use gl.VERTEX_ARRAY_BINDING: Phaser 4 polyfills bindVertexArray
        // via OES_vertex_array_object which does NOT add the constant to gl →
        // gl.VERTEX_ARRAY_BINDING === undefined → getParameter(undefined) → INVALID_ENUM.
        // Use the hardcoded spec value 0x85B5 instead (valid in both WebGL1+OES and WebGL2).
        const prevVAO = gl.bindVertexArray ? gl.getParameter(0x85b5) : null
        // Unbind VAO so our attrib writes go into the default VAO,
        // not Phaser's active VAO (which would corrupt its state).
        if (gl.bindVertexArray) gl.bindVertexArray(null)

        gl.useProgram(prog)
        gl.bindBuffer(gl.ARRAY_BUFFER, buf)
        gl.bufferData(gl.ARRAY_BUFFER, v, gl.DYNAMIC_DRAW)
        gl.enableVertexAttribArray(aLoc)
        gl.vertexAttribPointer(aLoc, 2, gl.FLOAT, false, 0, 0)
        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4)

        // Restore exact raw GL state so Phaser's wrapper state-tracker stays
        // in sync (tracker says "no change" → skips bind → actual state must
        // already match what tracker expects, otherwise drawElements crashes).
        gl.disableVertexAttribArray(aLoc)
        gl.bindBuffer(gl.ARRAY_BUFFER, prevBuf)
        gl.useProgram(prevProg)
        // Restore VAO last – also implicitly restores the ELEMENT_ARRAY_BUFFER
        // binding (EBO is per-VAO in WebGL2 / OES_vertex_array_object).
        if (gl.bindVertexArray) gl.bindVertexArray(prevVAO)
      }

      // Returns a RenderStep function that clips the container via stencil.
      // Insert at index 0 so it wraps the container's own render step.
      function createStencilStep(cx, cy, maskW, maskH, maskRot) {
        return function stencilStep(renderer, go, ctx, pm, step, dl, dli) {
          const gl = renderer.gl
          // Flush pending Phaser batches before changing GL state.
          // In Phaser 4 there is no renderer.flush() – the batch is flushed via
          // renderer.renderNodes.finishBatch(). This ensures items added to the
          // batch before this container (e.g. buttons) are drawn WITHOUT stencil.
          renderer.renderNodes.finishBatch()

          // Phase 1 – write mask shape into stencil buffer
          gl.enable(gl.STENCIL_TEST)
          gl.clear(gl.STENCIL_BUFFER_BIT)
          gl.colorMask(false, false, false, false)
          gl.stencilOp(gl.KEEP, gl.KEEP, gl.REPLACE)
          gl.stencilFunc(gl.ALWAYS, 1, 0xff)
          gl.stencilMask(0xff)

          drawRectToStencil(gl, cx, cy, maskW, maskH, maskRot, renderer.width, renderer.height)

          // Phase 2 – render container only where stencil == 1
          gl.colorMask(true, true, true, true)
          gl.stencilFunc(gl.EQUAL, 1, 0xff)
          gl.stencilOp(gl.KEEP, gl.KEEP, gl.KEEP)
          gl.stencilMask(0x00)

          go.renderWebGLStep(renderer, go, ctx, pm, step + 1, dl, dli)

          // Flush the container’s content with stencil test still active so the
          // GPU draws only the pixels inside the mask before we clean up.
          renderer.renderNodes.finishBatch()

          // Cleanup – restore GL state for the next game objects
          gl.disable(gl.STENCIL_TEST)
          gl.stencilMask(0xff)
        }
      }

      function boot() {
        const COLS = 4
        const ROWS = 4

        class ReproScene extends Phaser.Scene {
          constructor() {
            super()
            this.cells = []
            this.running = false
            this.clipped = true
            this.clipMode = 'filter' // 'filter' | 'stencil'  (Phaser 4 only)
          }

          create() {
            this.info = this.add
              .text(12, 12, '', {
                fontFamily: 'monospace',
                fontSize: '14px',
                color: '#e2e8f0',
                backgroundColor: '#111827cc',
                padding: { x: 8, y: 6 },
              })
              .setDepth(1000)

            this.makeButton('PHASER 3', PHASER_MAJOR === 3 ? '#3b82f6' : '#1e3a8a', () =>
              setVersion(3)
            ).setPosition(520, 120)
            this.makeButton('PHASER 4', PHASER_MAJOR === 4 ? '#3b82f6' : '#1e3a8a', () =>
              setVersion(4)
            ).setPosition(620, 120)
            this.clipBtn = this.makeButton('CLIP: ON', '#14532d', () =>
              this.toggleClip()
            ).setPosition(720, 120)

            if (PHASER_MAJOR === 4) {
              this.modeBtn = this.makeButton('MODE: FILTER', '#7e22ce', () =>
                this.toggleMode()
              ).setPosition(830, 120)
            }

            this.start()
          }

          update() {
            this.info.setText([
              `Phaser ${PHASER_MAJOR} Mask Repro`,
              `version: ${Phaser.VERSION}`,
              `renderer: ${this.game.renderer.type === Phaser.WEBGL ? 'WebGL' : 'Canvas'}`,
              `clip: ${this.clipped ? 'on' : 'off'}`,
              ...(PHASER_MAJOR === 4 ? [`mode: ${this.clipMode}`] : []),
              `containers: ${this.cells.length}`,
              `fps: ${Math.round(this.game.loop.actualFps)}`,
              `size: ${this.scale.width} x ${this.scale.height}`,
              `dpr: ${window.devicePixelRatio}`,
            ])
          }

          makeButton(label, bg, onClick) {
            return this.add
              .text(0, 0, label, {
                fontFamily: 'monospace',
                fontSize: '13px',
                color: '#fff',
                backgroundColor: bg,
                padding: { x: 9, y: 6 },
              })
              .setInteractive({ useHandCursor: true })
              .on('pointerdown', onClick)
          }

          start() {
            if (this.running) return

            const w = this.scale.width
            const h = this.scale.height
            const padX = 20
            const top = 170
            const gap = 14
            const cellW = (w - padX * 2 - gap * (COLS - 1)) / COLS
            const cellH = (h - top - 20 - gap * (ROWS - 1)) / ROWS

            for (let r = 0; r < ROWS; r++) {
              for (let c = 0; c < COLS; c++) {
                const cx = padX + c * (cellW + gap) + cellW * 0.5
                const cy = top + r * (cellH + gap) + cellH * 0.5

                // The blue box is the content; the rotated rectangle is the mask window
                const maskW = cellW * 0.36
                const maskH = cellH * 0.9
                const maskRot = 0.4

                const box = this.add
                  .rectangle(0, 0, cellW * 0.86, cellH * 0.86, 0x3a86ff, 1)
                  .setStrokeStyle(2, 0xffffff, 1)

                const container = this.add.container(cx, cy, [box])

                const extras = []

                if (this.clipped && PHASER_MAJOR === 4 && this.clipMode === 'stencil') {
                  // Phaser 4 stencil mode: inject a RenderStep at position 0 that writes
                  // the rotated rectangle into the WebGL stencil buffer directly –
                  // no extra framebuffer, no filter overhead.
                  container.addRenderStep(createStencilStep(cx, cy, maskW, maskH, maskRot), 0)
                  // no extras to clean up – container.destroy() handles everything
                } else if (this.clipped && PHASER_MAJOR === 4) {
                  // Phaser 4 filter mode (default)
                  const maskShape = this.add
                    .rectangle(cx, cy, maskW, maskH, 0xffffff, 1)
                    .setRotation(maskRot)
                    .setVisible(false)
                  container.enableFilters()
                  container.filters.internal.addMask(maskShape, false, this.cameras.main, 'world')
                  extras.push(maskShape)
                } else if (this.clipped) {
                  // Phaser 3: GeometryMask – draw the rotated rectangle as the clip region
                  const g = this.add.graphics()
                  g.fillStyle(0xffffff, 1)
                  g.setVisible(false) // hide the graphics object, but it still works as a mask input
                  g.save()
                  g.translateCanvas(cx, cy)
                  g.rotateCanvas(maskRot)
                  g.fillRect(-maskW * 0.5, -maskH * 0.5, maskW, maskH)
                  g.restore()
                  const mask = g.createGeometryMask()
                  container.setMask(mask)
                  extras.push(g)
                }

                this.cells.push({ container, extras })
              }
            }

            this.running = true
          }

          toggleClip() {
            this.stop()
            this.clipped = !this.clipped
            this.clipBtn.setText(this.clipped ? 'CLIP: ON' : 'CLIP: OFF')
            this.clipBtn.setStyle({ backgroundColor: this.clipped ? '#14532d' : '#7f1d1d' })
            this.start()
          }

          toggleMode() {
            this.stop()
            this.clipMode = this.clipMode === 'filter' ? 'stencil' : 'filter'
            const isStencil = this.clipMode === 'stencil'
            this.modeBtn.setText(isStencil ? 'MODE: STENCIL' : 'MODE: FILTER')
            this.modeBtn.setStyle({ backgroundColor: isStencil ? '#9333ea' : '#7e22ce' })
            this.start()
          }

          stop() {
            for (const cell of this.cells) {
              cell.container.destroy(true)
              for (const obj of cell.extras) obj.destroy()
            }

            this.cells = []
            this.running = false
          }
        }

        new Phaser.Game({
          type: Phaser.WEBGL,
          parent: 'app',
          render: { stencil: true },
          width: '100%',
          height: '100%',
          backgroundColor: '#111827',
          scene: [ReproScene],
          scale: {
            mode: Phaser.Scale.RESIZE,
            autoCenter: Phaser.Scale.CENTER_BOTH,
          },
        })
      }
    </script>
  </body>
</html>
