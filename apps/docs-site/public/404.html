<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="robots" content="noindex, follow" />
    <title>Page not found - PhaserJSX</title>
    <script>
      /*
       * GitHub Pages SPA fallback.
       * Known routes are prerendered as static HTML and served directly.
       * Unknown routes are restored in index.html so React can render NotFoundPage.
       */
      sessionStorage.setItem(
        'phaserjsx-redirect',
        location.pathname + location.search + location.hash,
      )
      location.replace('/')
    </script>
  </head>
  <body></body>
</html>
